name: build-luce-encrypted-json

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-luce-encrypted-json
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build encrypted Oggi in TV payloads
        env:
          LUCE_LIST_URL: ${{ secrets.LUCE_LIST_URL }}
          LUCE_CATALOGUE_URL: ${{ secrets.LUCE_CATALOGUE_URL }}
          LUCE_ENCRYPTION_KEY: ${{ secrets.LUCE_ENCRYPTION_KEY }}
        run: |
          python scripts/build_luce_payloads.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/luce-list.enc.json generated/luce-catalogue.enc.json
          git commit -m "Update encrypted luce payloads" || exit 0
          git pull --rebase origin main
          git push
